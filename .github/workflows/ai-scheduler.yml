name: AI Notion Monitor & Developer Loop (Manual Trigger)

# 💡 手動実行（GitHub画面のボタン）のみをトリガーに設定
on:
  workflow_dispatch: 

# 💡 【新規追加】GitHub全体のNode.js 20廃止に伴い、実行基盤をNode.js 24に一足早く強制オプトインして警告を消す
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# ワークフローがリポジトリへの書き込みやPR作成、認証を行えるよう権限を定義
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  ai-development-flow:
    runs-on: ubuntu-latest

    steps:
      # 1. コードのチェックアウト
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # すべての分岐履歴を取得（自律ブランチ作成やmainの解析に必要）

      # 2. Node.js 環境のセットアップ
      # 💡 修正点: ランナーに合わせて開発環境も Node.js 24 にアップデート
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # 3. パッケージマネージャー(pnpm)のインストールとTypeScript実行環境の解決
      - name: Install Dependencies
        run: |
          npm install -g pnpm
          
          # AIの実行に必要なGoogle公式の最新GenAIライブラリを直接インストール
          npm install @google/genai
          
          # Node.js上でTypeScriptファイルを直接・高速に実行できる「tsx」をグローバル導入
          npm install -g tsx
          
          # 既存の package.json がある場合は、プロジェクトの依存関係もインストール
          if [ -f "package.json" ]; then
            # 💡 【解決策】--ignore-scripts を付与して、エラーの元になるビルドスクリプト自体の実行をすべてスキップする
            pnpm install --no-frozen-lockfile --ignore-scripts
          else
            echo "🎵 package.json が直下にないため、個別インストールのみで進行します"
          fi
          
          # Next.jsのインストール状態とバージョン情報をログに出力して確認する
          echo "🔍 GitHub Actions上のNext.js環境を確認中..."
          if [ -f "node_modules/.bin/next" ]; then
            pnpm next info
          else
            echo "⚠️ 警告: node_modules 内に Next.js の実体（バイナリ）が見つかりません！"
            echo "プロジェクトのルートに package.json が存在し、next がインストールされているか確認してください。"
          fi
          
      # 4. Notionに「Claude生成待ち」のタスクがないかチェック（1件取得して task_info.json を作成）
      - name: Check Notion Database
        id: check_notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node scripts/cron-scheduler.js
          if [ -f "task_info.json" ]; then
            TASK_ID=$(node -e "console.log(require('./task_info.json').TASK_ID)")
            echo "TASK_ID=$TASK_ID" >> $GITHUB_ENV
            echo "検出されたタスクID: $TASK_ID"
          else
            echo "処理対象のタスクはありませんでした。"
          fi

      # 4.5. メインブランチ（main）の既存コード構造と中身をスキャンして一時保存
      - name: Capture Main Branch Context
        if: env.TASK_ID != ''
        run: |
          echo "📂 メインブランチ（main）の既存ソースコードを確認中..."
          echo "=== 既存のファイル構成 ===" > main_context.txt
          
          # node_modulesや.git、.nextを除外して、主要なソースコード（srcなど）の構造をリスト化
          find src -maxdepth 5 -not -path '*/.*' >> main_context.txt || echo "src directory empty yet" >> main_context.txt
          
          echo -e "\n=== 主要なファイルのソースコード ===" >> main_context.txt
          # 既存の画面コンポーネント（.tsx, .ts）があれば、その中身をすべて1つのテキストファイルにマージする
          if [ -d "src/app" ]; then
            find src/app \( -name "*.tsx" -o -name "*.ts" \) | xargs -I {} sh -c 'echo "--- File: {} ---" >> main_context.txt; cat {} >> main_context.txt'
          fi
          
          # 既存の共通設定ファイルもコンテキストとして結合
          echo "--- File: package.json ---" >> main_context.txt
          cat package.json >> main_context.txt

      # 5. 【条件分岐】タスクがある場合のみ、専用のGitブランチを作成
      - name: Create Feature Branch
        if: env.TASK_ID != ''
        run: |
          git config --global user.name "Gemini Developer Bot"
          git config --global user.email "gemini-bot@yourdomain.local"
          
          # タスクIDそのものをブランチ名にして切り替え
          git checkout -b "$TASK_ID"

      # 6. 【条件分岐】Geminiによるソースコード・テストコードの自動生成
      - name: Run Gemini Coder
        if: env.TASK_ID != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/gemini-coder.js

      # 7. 【条件分岐】自動テスト ＆ コーディングルールチェック ＆ 自律修正ループ（最大3回リトライ）
      - name: Execute Lint, Tests and Self-Healing Loop
        if: env.TASK_ID != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI: true # VitestをCIモードで確実に終了させるためのフラグ
        run: |
          echo "🏗️ Next.jsのLint環境を初期化中..."
          pnpm next info || echo "Proceeding..."
          
          attempt=0
          max_attempts=3
          success=false

          until [ $attempt -ge $max_attempts ]
          do
            echo "🧪 規約チェック（Lint）および単体テストを実行中... (試行 $(($attempt+1))/$max_attempts)"
            
            echo "🧹 コーディングルール（Lint）検証中..."
            pnpm lint > test_result.log 2>&1 || true
            lint_status=$?

            echo "🧪 単体テスト（Vitest）実行中..."
            pnpm test >> test_result.log 2>&1 || true
            test_status=$?

            if [ $lint_status -eq 0 ] && [ $test_status -eq 0 ]; then
              echo "✅ コーディングルールおよびテストを全てクリアしました！"
              cat test_result.log
              success=true
              break
            fi

            echo "❌ 規約違反またはテスト失敗を検知しました。エラーログはこちら:"
            cat test_result.log
            
            attempt=$(($attempt+1))
            if [ $attempt -lt $max_attempts ]; then
              echo "🤖 Geminiにエラーログ（Lint/Test）を送信して自律修正させます..."
              node scripts/gemini-fixer.js
            fi
          done

          if [ "$success" = false ]; then
            echo "🚨 ルール違反またはテスト失敗が3回以内に修正されませんでした。処理を中断します。"
            exit 1
          fi

      # 8. 【条件分岐】成果物をプッシュし、GitHub上でプルリクエスト(PR)を自動作成
      - name: Push Code and Create Pull Request
        if: env.TASK_ID != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .
          git commit -m "feat($TASK_ID): GeminiによるTypeScriptコードおよびテストの自動生成（テスト通過済み）"
          
          # リモートへタスクID名でプッシュ
          git push -u origin "$TASK_ID" --force
          
          # GitHub CLI を使ってプルリクエストを作成
          gh pr create \
            --title "【Gemini自動生成】$TASK_ID" \
            --body "Notionの「Claude生成待ち」ステータスから自動起票されたPRです。規約チェック（Lint）およびVitestテストは正常に通過しています。目視レビューをお願いします。" \
            --base main \
            --head "$TASK_ID"

      # 9. 【条件分岐】すべての工程が完了したら、Notionのステータスを「Git格納済み」に更新
      - name: Update Notion Status to Git Stored
        if: env.TASK_ID != ''
        run: |
          PAGE_ID=$(node -e "console.log(require('./task_info.json').PAGE_ID)")
          
          echo "📝 Notionのタスク（ページID: $PAGE_ID）を『Git格納済み』に更新中..."
          
          curl -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data '{
              "properties": {
                "ステータス": {
                  "status": {
                    "name": "Git格納済み"
                  }
                }
              }
            }'
          
          echo "🎉 すべての自動化プロセスが正常に完了しました！"
